connector.name=iceberg
iceberg.file-format=parquet
iceberg.max-partitions-per-writer=1000
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=warehouse
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/ngods?user=ngods&password=ngods
iceberg.jdbc-catalog.default-warehouse-dir=s3://warehouse
# Native S3 filesystem (replaces removed hive.s3.* properties)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=minio
s3.aws-secret-key=minio123
s3.path-style-access=true
s3.region=us-east-1
s3.max-connections=1000
s3.socket-connect-timeout=120s
s3.socket-read-timeout=120s
