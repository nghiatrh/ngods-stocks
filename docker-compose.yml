version: '3.9'
services:

  minio:
    hostname: minio
    image: 'minio/minio'
    container_name: minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./data/minio:/data
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    command: server /data --console-address ":9001"
    networks:
      - ndsnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  mc:
    image: minio/mc
    container_name: mc
    hostname: mc
    environment:
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_REGION=us-east-1
    networks:
      - ndsnet
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 minio minio123) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc anonymous set public minio/warehouse;
      exit 0;
      "
    depends_on:
      minio:
        condition: service_healthy  

  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=ngods
      - POSTGRES_USER=ngods
      - POSTGRES_DB=ngods
    ports:
      - '5432:5432'
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ndsnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngods"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  aio:
    build: aio/
    container_name: aio
    environment:
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_REGION=us-east-1
      - VNSTOCK_API_KEY=${VNSTOCK_API_KEY:-}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://ngods:ngods@postgres:5432/airflow
      - AIRFLOW__API__SECRET_KEY=ngods-airflow-secret-key
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/var/lib/ngods/airflow/dags
    volumes:
      - ./data/html:/var/lib/ngods/html
      - ./data/stage:/var/lib/ngods/stage
      - ./data/spark/notebooks:/var/lib/ngods/notebooks
      - ./projects/airflow/dags:/var/lib/ngods/airflow/dags
      - ./projects/dbt:/var/lib/ngods/dbt
    ports:
      - '8888:8888' # Spark notebook port
      - '7077:7077' # Spark port
      - '8061:8061' # Spark master web ui port
      - '8062:8062' # Spark worker web ui port
      - '10000:10000' # Thrift ODBC/JDBC port
      - '10009:10009' # Kyuubi JDBC port
      - '18080:18080' # Spark history web ui port
      - '8080:8080' # Airflow web ui port
    networks:
      ndsnet:
        aliases:
          - spark
          - airflow
          - dbt
          - aio
    command:
      - notebook
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
  
  trino:
    build: trino/
    container_name: trino
    volumes:
      - ./data/stage:/var/lib/ngods/stage
      - ./certs/trino.pass:/trino.pass
      - ./certs/trino_key_and_cert.pem:/trino_key_and_cert.pem
      - ./certs/trino_key.pem:/trino_key.pem
      - ./certs/trino_cert.pem:/trino_cert.pem
    ports:
      - '8060:8060' # Trino
      - '8063:8063' # Trino
    networks:
      ndsnet:
        aliases:
          - trino
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000

  cube:
    image: cubejs/cube
    container_name: cube
    hostname: cube
    volumes:
      - ./conf/cube:/cube/conf
    ports:
      - 3000:3000 
      - 4000:4000
      - 3245:3245
    networks:
      - ndsnet
    depends_on:
      - aio

  metabase:
    container_name: metabase
    depends_on:
      - cube
    hostname: metabase
    build: metabase/
    volumes:
      - ./conf/metabase:/conf
    ports:
      - 3030:3030
    networks:
      - ndsnet

  chat-api:
    build:
      context: projects/chat
    image: ngods-chat:latest
    container_name: chat-api
    hostname: chat-api
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - CHAT_DB_DSN=postgresql://ngods:ngods@postgres:5432/chat
      - CUBE_API_URL=http://cube:4000
      - CUBE_API_SECRET=cube
      - DBT_MANIFEST_PATH=/dbt/gold_vnstock/target/manifest.json
      - LLM_ROUTER_MODEL=${LLM_ROUTER_MODEL:-claude-haiku-4-5-20251001}
      - LLM_GENERATOR_MODEL=${LLM_GENERATOR_MODEL:-claude-sonnet-4-6}
    volumes:
      - ./projects/chat:/app
      - ./projects/dbt:/dbt:ro
      - ./conf/cube:/cube/conf:ro
    ports:
      - '8001:8001'
    networks:
      - ndsnet
    depends_on:
      postgres:
        condition: service_healthy

  chat-ui:
    image: ngods-chat:latest
    container_name: chat-ui
    hostname: chat-ui
    environment:
      - CHAT_API_URL=http://chat-api:8001
    volumes:
      - ./projects/chat:/app
    command: ["chainlit", "run", "ui/chainlit_app.py", "--host", "0.0.0.0", "--port", "8501", "--headless"]
    ports:
      - '8501:8501'
    networks:
      - ndsnet
    depends_on:
      - chat-api

  # ---------------------------------------------------------------------------
  # Realtime streaming layer — Kafka (KRaft) + vnstock tick producer
  # ---------------------------------------------------------------------------

  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    hostname: kafka
    environment:
      - CLUSTER_ID=jJEIU3vvSbCDjHLvbqmCgg
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    ports:
      - '29092:29092' # host access (advertised as localhost:29092)
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ndsnet
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # One-shot topic creation (same pattern as mc for MinIO buckets):
  # market.ticks keeps 7 days for replay/backfill, market.metrics.1m keeps 3.
  kafka-init:
    image: apache/kafka:3.9.1
    container_name: kafka-init
    entrypoint: >
      /bin/sh -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic market.ticks --partitions 3 --replication-factor 1 --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic market.metrics.1m --partitions 3 --replication-factor 1 --config retention.ms=259200000;
      exit 0;
      "
    networks:
      - ndsnet
    depends_on:
      kafka:
        condition: service_healthy

  tick-producer:
    build: projects/tick-producer
    container_name: tick-producer
    hostname: tick-producer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TICKS_TOPIC=market.ticks
      - POLL_INTERVAL_SECONDS=30
      - TRADING_HOURS_ONLY=${TRADING_HOURS_ONLY:-true}
      - VNSTOCK_API_KEY=${VNSTOCK_API_KEY:-}
    networks:
      - ndsnet
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    environment:
      - KAFKA_CLUSTERS_0_NAME=ngods
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - '8082:8080' # Kafka UI (8080 already used by Airflow)
    networks:
      - ndsnet
    depends_on:
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # OpenMetadata — metadata catalog, lineage & governance (UI on :8585)
  # ---------------------------------------------------------------------------

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ndsnet
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # One-shot schema migration. Gated behind the "init" profile so it does NOT
  # run on a normal `docker compose up -d`. Run it only on first setup or after
  # bumping the OpenMetadata image version:
  #   docker compose --profile init run --rm execute-migrate-all
  execute-migrate-all:
    image: docker.getcollate.io/openmetadata/server:1.13.0
    container_name: execute-migrate-all
    profiles: ["init"]
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      DB_DRIVER_CLASS: "org.postgresql.Driver"
      DB_SCHEME: "postgresql"
      DB_PARAMS: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      DB_USER: "ngods"
      DB_USER_PASSWORD: "ngods"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      OM_DATABASE: "openmetadata"
      ELASTICSEARCH_HOST: "elasticsearch"
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: "http"
      SERVER_PORT: "8585"
      SERVER_ADMIN_PORT: "8586"
    networks:
      - ndsnet
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  openmetadata-server:
    image: docker.getcollate.io/openmetadata/server:1.13.0
    container_name: openmetadata-server
    hostname: openmetadata-server
    ports:
      - "8585:8585"
      - "8586:8586"
    environment:
      DB_DRIVER_CLASS: "org.postgresql.Driver"
      DB_SCHEME: "postgresql"
      DB_PARAMS: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      DB_USER: "ngods"
      DB_USER_PASSWORD: "ngods"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      OM_DATABASE: "openmetadata"
      ELASTICSEARCH_HOST: "elasticsearch"
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: "http"
      SERVER_PORT: "8585"
      SERVER_ADMIN_PORT: "8586"
      OPENMETADATA_HEAP_OPTS: "-Xmx1G -Xms1G"
      LOG_LEVEL: "INFO"
    networks:
      - ndsnet
    # No depends_on execute-migrate-all: the schema is migrated once via the
    # "init" profile and persists in Postgres. The server retries its DB
    # connection on boot, so it is safe to start without the migration job.
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  openmetadata-ingestion:
    image: docker.getcollate.io/openmetadata/ingestion:1.13.0
    container_name: openmetadata-ingestion
    hostname: openmetadata-ingestion
    # Port 8080 intentionally NOT published to the host — aio's Airflow already
    # occupies host:8080. The OM server reaches this container via the docker
    # network alias openmetadata-ingestion:8080.
    # The OM bootstrap script (ingestion_dependency.sh) initialises the Airflow DB,
    # sets up SimpleAuthManager, and starts api-server + dag-processor + scheduler.
    command: ["bash", "/opt/airflow/ingestion_dependency.sh"]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://ngods:ngods@postgres:5432/openmetadata_airflow"
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_ADMIN_USER: "admin"
      AIRFLOW_ADMIN_PASSWORD: "admin"
      OPENMETADATA_SERVER_URL: "http://openmetadata-server:8585"
    volumes:
      - ./projects/dbt:/dbt:ro
    networks:
      - ndsnet
    depends_on:
      openmetadata-server:
        condition: service_healthy
    restart: unless-stopped

networks:
  ndsnet:
    driver: bridge

volumes:
  postgres_data:
  elasticsearch_data:
  kafka_data:
